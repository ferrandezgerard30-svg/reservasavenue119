<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Avenue 119</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f5f0e8;--beige:#e8ddc8;--warm:#c4a882;--brown:#8b6340;
  --dark-brown:#3d2b1a;--black:#141010;--white:#fdfaf5;
  --text:#2c1f14;--muted:#9a8570;
  --sidebar-w:240px;
  --success:#27ae60;--danger:#c0392b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--black);position:relative;overflow:hidden;}
#login-screen::before{content:'AVENUE 119';position:absolute;font-family:'Cormorant Garamond',serif;font-size:20vw;font-weight:700;color:rgba(255,255,255,0.02);letter-spacing:10px;white-space:nowrap;user-select:none;}
.login-box{background:var(--white);padding:56px 48px;width:380px;text-align:center;position:relative;z-index:1;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;letter-spacing:5px;color:var(--black);margin-bottom:6px;}
.login-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:44px;font-weight:500;}
.login-field{position:relative;margin-bottom:14px;}
.login-field input{width:100%;padding:14px 16px;border:1px solid var(--beige);background:var(--cream);font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;}
.login-field input:focus{border-color:var(--brown);}
.btn-login{width:100%;padding:16px;background:var(--black);color:var(--white);font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;font-weight:700;cursor:pointer;border:none;transition:background 0.2s;margin-top:8px;}
.btn-login:hover{background:var(--brown);}
.login-err{color:var(--danger);font-size:12px;margin-top:14px;display:none;letter-spacing:0.5px;}

/* APP */
#app{display:none;min-height:100vh;}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--black);display:flex;flex-direction:column;z-index:50;}
.sidebar-brand{padding:32px 28px 24px;border-bottom:1px solid rgba(255,255,255,0.06);}
.sidebar-brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;letter-spacing:4px;color:var(--white);}
.sidebar-brand-tag{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:4px;font-weight:500;}
.sidebar-nav{flex:1;padding:20px 0;overflow-y:auto;}
.nav-section-label{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.2);padding:16px 28px 8px;font-weight:600;}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:13px 28px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;}
.sidebar-item:hover{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.04);}
.sidebar-item.active{color:var(--warm);background:rgba(196,168,130,0.07);border-left-color:var(--warm);}
.sidebar-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.7;}
.sidebar-item.active svg{opacity:1;}
.sidebar-footer{padding:20px 28px;border-top:1px solid rgba(255,255,255,0.06);}
.btn-logout{width:100%;padding:11px 16px;background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.35);font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;font-weight:600;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}

/* MAIN */
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--white);padding:0 40px;border-bottom:1px solid var(--beige);display:flex;justify-content:space-between;align-items:center;height:64px;position:sticky;top:0;z-index:40;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--black);}
.topbar-right{display:flex;align-items:center;gap:16px;}
.topbar-date{font-size:12px;color:var(--muted);letter-spacing:0.5px;}
.topbar-badge{background:var(--warm);color:var(--black);padding:4px 12px;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;}
.content{padding:32px 40px;flex:1;}

/* TABS */
.tab-panel{display:none;animation:fadeIn 0.3s ease;}
.tab-panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:var(--white);border:1px solid var(--beige);padding:24px 28px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--warm);}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:700;color:var(--black);line-height:1;}
.stat-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-top:8px;font-weight:600;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

/* CALENDARIO */
.cal-header{display:flex;flex-direction:column;gap:14px;margin-bottom:24px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.cal-nav button{background:var(--white);border:1px solid var(--beige);width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;cursor:pointer;color:var(--text);transition:all 0.2s;flex-shrink:0;}
.cal-nav button:hover{background:var(--black);color:var(--white);border-color:var(--black);}
.cal-date-display{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--black);min-width:260px;text-align:center;}
.barbero-filter{display:flex;gap:6px;flex-wrap:wrap;}
.bbtn{padding:9px 18px;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:600;cursor:pointer;border:1px solid var(--beige);background:var(--white);color:var(--muted);transition:all 0.2s;font-family:'Outfit',sans-serif;}
.bbtn:hover{border-color:var(--brown);color:var(--brown);}
.bbtn.active{background:var(--black);color:var(--white);border-color:var(--black);}

/* COLUMNAS BARBEROS */
.cal-cols{display:grid;gap:12px;}
.cal-col{background:var(--white);border:1px solid var(--beige);overflow:hidden;}
.cal-col-head{background:var(--dark-brown);color:var(--white);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.cal-col-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;letter-spacing:1px;}
.cal-col-count{font-size:10px;letter-spacing:2px;color:var(--warm);text-transform:uppercase;font-weight:600;}
.timeline-row{display:flex;align-items:center;border-bottom:1px solid rgba(0,0,0,0.05);min-height:50px;transition:background 0.15s;}
.timeline-row:hover{background:rgba(196,168,130,0.05);}
.timeline-hour{width:72px;flex-shrink:0;padding:0 14px;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;border-right:1px solid var(--beige);}
.timeline-slot{flex:1;padding:6px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.cita-chip{display:flex;flex-direction:column;padding:8px 14px;background:var(--dark-brown);color:var(--white);cursor:pointer;transition:all 0.2s;min-width:160px;border-left:3px solid var(--warm);}
.cita-chip:hover{background:var(--brown);}
.cita-chip.cancelada{background:rgba(192,57,43,0.08);color:var(--danger);border-left-color:var(--danger);}
.cita-chip strong{font-size:13px;font-weight:600;}
.cita-chip small{font-size:11px;opacity:0.65;margin-top:2px;}
.slot-add{width:30px;height:30px;border:1px dashed rgba(196,168,130,0.4);background:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.slot-add:hover{border-color:var(--warm);color:var(--warm);}
.slot-closed{font-size:11px;color:rgba(196,168,130,0.4);font-style:italic;padding:4px 8px;}
.cerrado-msg{padding:24px;text-align:center;font-size:13px;color:var(--muted);font-style:italic;}

/* TABLA */
.table-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
.table-filters{display:flex;gap:8px;flex-wrap:wrap;}
.filter-inp{padding:9px 14px;border:1px solid var(--beige);background:var(--white);font-family:'Outfit',sans-serif;font-size:12px;color:var(--text);outline:none;transition:border-color 0.2s;}
.filter-inp:focus{border-color:var(--brown);}
.btn-new{padding:10px 22px;background:var(--black);color:var(--white);font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;cursor:pointer;border:none;transition:background 0.2s;}
.btn-new:hover{background:var(--brown);}
.table-wrap{background:var(--white);border:1px solid var(--beige);overflow:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:13px 16px;text-align:left;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--beige);font-weight:700;white-space:nowrap;}
tbody td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--beige);vertical-align:middle;}
tbody tr:hover td{background:rgba(196,168,130,0.04);}
tbody tr:last-child td{border-bottom:none;}
.badge{display:inline-block;padding:4px 10px;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;}
.badge.confirmada{background:rgba(39,174,96,0.1);color:var(--success);}
.badge.cancelada{background:rgba(192,57,43,0.1);color:var(--danger);}
.badge.pasada{background:rgba(138,117,96,0.1);color:var(--muted);}
.td-name{font-weight:600;color:var(--black);}
.td-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-tbl{padding:6px 12px;font-family:'Outfit',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;cursor:pointer;border:1px solid var(--beige);background:var(--white);color:var(--text);transition:all 0.2s;margin-right:4px;}
.btn-tbl:hover{background:var(--black);color:var(--white);border-color:var(--black);}
.btn-tbl.danger{border-color:rgba(192,57,43,0.3);color:var(--danger);}
.btn-tbl.danger:hover{background:var(--danger);color:var(--white);border-color:var(--danger);}
.empty-row td{text-align:center;padding:48px;color:var(--muted);font-style:italic;}

/* CIERRES */
.cierres-layout{display:grid;grid-template-columns:420px 1fr;gap:28px;}
.panel{background:var(--white);border:1px solid var(--beige);padding:32px;}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--black);margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--beige);}
.field{margin-bottom:18px;}
.field label{display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--brown);margin-bottom:8px;font-weight:600;}
.field input,.field select{width:100%;padding:12px 14px;border:1px solid var(--beige);background:var(--cream);font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color 0.2s;appearance:none;}
.field input:focus,.field select:focus{border-color:var(--brown);}
.btn-save{padding:13px 28px;background:var(--black);color:var(--white);font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;cursor:pointer;border:none;transition:background 0.2s;}
.btn-save:hover{background:var(--brown);}
.cierre-item{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border:1px solid var(--beige);margin-bottom:8px;background:var(--cream);}
.cierre-item-left strong{font-size:13px;color:var(--black);font-weight:600;}
.cierre-item-left span{font-size:12px;color:var(--muted);display:block;margin-top:2px;}
.btn-del{padding:7px 14px;background:transparent;border:1px solid rgba(192,57,43,0.3);color:var(--danger);font-family:'Outfit',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-del:hover{background:var(--danger);color:var(--white);}
.inline-msg{font-size:12px;padding:10px 14px;margin-top:12px;display:none;}
.inline-msg.ok{background:rgba(39,174,96,0.08);color:var(--success);}
.inline-msg.err{background:rgba(192,57,43,0.08);color:var(--danger);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(20,16,16,0.75);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);padding:40px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--black);margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--beige);}
.modal-footer{display:flex;gap:10px;margin-top:24px;justify-content:flex-end;}
.btn-modal-close{padding:11px 22px;background:var(--cream);color:var(--text);font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;cursor:pointer;border:1px solid var(--beige);transition:all 0.2s;}
.btn-modal-close:hover{background:var(--beige);}
.btn-modal-primary{padding:11px 22px;background:var(--black);color:var(--white);font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;cursor:pointer;border:none;transition:background 0.2s;}
.btn-modal-primary:hover{background:var(--brown);}
.btn-modal-danger{padding:11px 22px;background:var(--danger);color:var(--white);font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;cursor:pointer;border:none;transition:background 0.2s;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.detail-item{padding:14px 0;border-bottom:1px solid var(--beige);}
.detail-item:nth-child(odd){padding-right:20px;}
.detail-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px;}
.detail-value{font-size:14px;color:var(--black);font-weight:500;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* CONTACTO */
#tab-contacto .contact-hero{background:var(--black);padding:48px;margin-bottom:24px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;}
.contact-hero-text h2{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:var(--white);line-height:1.1;}
.contact-hero-text h2 em{font-style:italic;color:var(--warm);}
.contact-hero-text p{font-size:13px;color:rgba(255,255,255,0.45);margin-top:12px;line-height:1.7;}
.contact-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.contact-card{background:var(--white);border:1px solid var(--beige);padding:28px;position:relative;overflow:hidden;transition:all 0.2s;}
.contact-card:hover{border-color:var(--warm);box-shadow:0 4px 20px rgba(196,168,130,0.15);}
.contact-card-icon{width:44px;height:44px;border:1px solid var(--beige);display:flex;align-items:center;justify-content:center;color:var(--warm);margin-bottom:16px;}
.contact-card-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px;}
.contact-card-value{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--black);line-height:1.2;}
.contact-card-sub{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5;}
.contact-card-link{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--brown);text-decoration:none;transition:gap 0.2s;}
.contact-card-link:hover{gap:10px;}
.contact-card-link::after{content:'→';}
.horario-table{background:var(--white);border:1px solid var(--beige);overflow:hidden;}
.horario-table-head{background:var(--dark-brown);color:var(--white);padding:16px 24px;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;}
.horario-row-item{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;border-bottom:1px solid var(--beige);}
.horario-row-item:last-child{border-bottom:none;}
.horario-row-item:hover{background:rgba(196,168,130,0.04);}
.horario-dia-name{font-size:13px;font-weight:600;color:var(--black);}
.horario-dia-hours{font-size:12px;color:var(--muted);}
.horario-dia-closed{font-size:11px;color:var(--danger);font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.social-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px;}
.social-card{background:var(--white);border:1px solid var(--beige);padding:24px;display:flex;align-items:center;gap:16px;text-decoration:none;transition:all 0.2s;}
.social-card:hover{border-color:var(--warm);background:rgba(196,168,130,0.04);}
.social-card-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--black);color:var(--warm);flex-shrink:0;}
.social-card-icon svg{width:20px;height:20px;}
.social-card-name{font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--black);}
.social-card-handle{font-size:12px;color:var(--muted);margin-top:3px;}

@media(max-width:900px){
  /* Core layout */
  .sidebar{display:none;}
  .main{margin-left:0;}
  .topbar{padding:0 16px;height:56px;box-shadow:0 1px 0 var(--beige);}
  .topbar-title{font-size:17px;letter-spacing:1px;}
  .topbar-date,.topbar-badge{display:none;}
  .content{padding:14px 12px;padding-bottom:82px!important;}

  /* Stats */
  .stats-row{grid-template-columns:1fr 1fr;gap:8px;}
  .stat-card{padding:14px 16px;border-radius:0;}
  .stat-num{font-size:28px;}
  .stat-label{font-size:9px;letter-spacing:1.5px;}

  /* Calendar header */
  .cal-header{gap:10px;margin-bottom:14px;}
  .cal-nav{gap:0;background:var(--white);border:1px solid var(--beige);display:flex;overflow:hidden;}
  .cal-nav button{border:none!important;border-right:1px solid var(--beige)!important;width:44px;height:44px;font-size:18px;background:transparent;flex-shrink:0;}
  .cal-nav button:last-child{border-right:none!important;border-left:1px solid var(--beige)!important;}
  .cal-nav button:hover{background:var(--cream)!important;color:var(--black)!important;}
  .cal-date-display{font-size:15px;padding:0 8px;}

  /* Barbero filter pills */
  .barbero-filter{flex-wrap:nowrap;overflow-x:auto;gap:6px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .barbero-filter::-webkit-scrollbar{display:none;}
  .bbtn{white-space:nowrap;flex-shrink:0;padding:8px 14px;font-size:10px;letter-spacing:1px;border-radius:0;}

  /* Calendar columns - stacked */
  .cal-cols{grid-template-columns:1fr!important;gap:8px;}
  .cal-col{overflow:hidden;}
  .cal-col-head{padding:12px 14px;}
  .cal-col-name{font-size:15px;}
  .cal-col-count{font-size:9px;}
  .timeline-row{min-height:42px;}
  .timeline-hour{width:48px;font-size:10px;padding:0 8px;letter-spacing:0;background:var(--cream);}
  .timeline-slot{padding:4px 10px;gap:4px;}
  .cita-chip{padding:7px 12px;min-width:0;width:100%;}
  .cita-chip strong{font-size:12px;}
  .cita-chip small{font-size:10px;opacity:0.7;}
  .slot-add{width:28px;height:28px;font-size:18px;opacity:0.4;}

  /* Citas — card layout */
  .stats-row{margin-bottom:14px;}
  .tabla-header{flex-direction:column;gap:10px;margin-bottom:14px;}
  .tabla-filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .tabla-filters input[type=date]{grid-column:1/-1;}
  .filter-select{font-size:12px;padding:9px 12px;}
  .tabla-header .btn-action{width:100%!important;text-align:center;}
  table,thead,tbody,th,td,tr{display:block;}
  thead{display:none;}
  tbody tr{
    background:var(--white);
    border:none;border-left:3px solid var(--warm);
    margin-bottom:10px;padding:14px 16px;
    box-shadow:0 1px 4px rgba(0,0,0,0.07);
  }
  tbody td{border:none;padding:1px 0;line-height:1.7;}
  tbody td:nth-child(1){font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
  tbody td:nth-child(2){font-size:22px;font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--black);line-height:1.1;margin:2px 0 4px;}

<script>
const SUPA_URL = "https://hgezdgpjrjrzzwgeavde.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhnZXpkZ3Bqcmpyenp3Z2VhdmRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTM1MDcsImV4cCI6MjA5MTc2OTUwN30.6lVhBZIhVvmGAw1hjpQBYPI-e14DpHCnr3NcQtoG7xE";
const USER = "avenue119", PASS = "admin2024";

let todasCitas = [], todosCierres = JSON.parse(localStorage.getItem('av119_cierres')||'[]');
let calFecha = new Date(); calFecha.setHours(0,0,0,0);
let calBarbero = 'Todos';

const DIAS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const BARBEROS = ['Rafa','Alfredo','David','Marcos'];
const HORARIOS = {
  0:[],
  1:["10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","16:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30"],
  2:["10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","16:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30"],
  3:["09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","16:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30","20:00","20:30"],
  4:["09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","15:30","16:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30","20:00","20:30"],

  6:["09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30"]
};

async function supa(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
  const text = await r.text();
  if(!r.ok) throw new Error(text);
  return text ? JSON.parse(text) : [];
}

// AUTH
function login(){
  const u=document.getElementById('l-user').value;
  const p=document.getElementById('l-pass').value;
  if(u===USER && p===PASS){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('login-err').style.display='none';
    initApp();
  } else {
    document.getElementById('login-err').style.display='block';
    document.getElementById('l-pass').value='';
    document.getElementById('l-pass').focus();
  }
}
function logout(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('l-user').value='';
  document.getElementById('l-pass').value='';
}

function initApp(){
  document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  renderCierres();
  cargarCitas();
}

function showTab(t){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  const idx={calendario:0,citas:1,cierres:2}[t];
  if(idx!==undefined) document.querySelectorAll('.sidebar-item')[idx].classList.add('active');
  document.getElementById('topbar-title').textContent={calendario:'Calendario',citas:'Todas las citas',cierres:'Gestión de cierres'}[t]||t;
  // Sync bottom nav
  document.querySelectorAll('.mobile-bottom-nav button[data-tab]').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===t);
  });
  if(t==='citas'){calcStats();renderTabla();}
  if(t==='cierres') renderCierres();
}

async function cargarCitas(){
  document.getElementById('cal-cols').innerHTML='<div style="padding:40px;color:var(--muted);font-size:13px;font-style:italic;">Cargando citas...</div>';
  try {
    todasCitas = await supa('citas?order=fecha.asc,hora.asc');
  } catch(e) {
    todasCitas = [];
    document.getElementById('cal-cols').innerHTML='<div style="padding:40px;text-align:center;"><p style="color:#e07060;font-size:13px;margin-bottom:16px;">Error: '+e.message+'</p><button onclick="cargarCitas()" style="background:var(--warm);color:var(--black);border:none;padding:10px 24px;font-family:Outfit,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;cursor:pointer;">Reintentar</button></div>';
    return;
  }
  renderCalendario();
  calcStats();
  renderTabla();
}

function toStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function formatFecha(f){
  if(!f) return '—';
  const d=new Date(f+'T12:00:00');
  return d.getDate()+' '+MESES[d.getMonth()];
}

function calcStats(){
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const hoyStr=toStr(hoy);
  const finSem=new Date(hoy); finSem.setDate(finSem.getDate()+7);
  let h=0,s=0,t=0,c=0;
  todasCitas.forEach(x=>{
    if(x.estado==='CONFIRMADA'){t++;if(x.fecha===hoyStr)h++;if(x.fecha>=hoyStr&&x.fecha<toStr(finSem))s++;}
    else if(x.estado==='CANCELADA') c++;
  });
  document.getElementById('s-hoy').textContent=h;
  document.getElementById('s-semana').textContent=s;
  document.getElementById('s-total').textContent=t;
  document.getElementById('s-canceladas').textContent=c;
}

function renderTabla(){
  const fB=document.getElementById('f-barbero').value;
  const fE=document.getElementById('f-estado').value;
  const fF=document.getElementById('f-fecha').value;
  const tbody=document.getElementById('tabla-body');
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  let citas=[...todasCitas].filter(c=>{
    if(fB&&c.barbero!==fB) return false;
    if(fE&&c.estado!==fE) return false;
    if(fF&&c.fecha!==fF) return false;
    return true;
  }).sort((a,b)=>((a.fecha+a.hora)<(b.fecha+b.hora)?1:-1));
  tbody.innerHTML='';
  if(!citas.length){ tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:40px;font-style:italic">No hay citas</td></tr>'; return; }
  citas.forEach(c=>{
    const pasada=new Date(c.fecha+'T12:00:00')<hoy;
    const badge=c.estado==='CANCELADA'?'cancelada':(pasada?'pasada':'confirmada');
    const tr=document.createElement('tr');
    tr.dataset.id=c.id;
    const cancelBtn=c.estado==='CONFIRMADA'?'<button class="btn-sm danger" onclick="cancelarAdminRow(this)" data-id="'+c.id+'" style="padding:6px 14px;font-size:10px;margin-left:6px">Cancelar</button>':'';
    tr.innerHTML=
      '<td>'+formatFecha(c.fecha)+'</td>'+
      '<td><strong>'+(c.hora||'—')+'</strong></td>'+
      '<td>'+(c.nombre||'—')+'<br><small style="color:var(--muted)">'+(c.email||'')+'</small></td>'+
      '<td>'+(c.barbero||'—')+'</td>'+
      '<td style="font-size:12px">'+(c.servicio||'')+'</td>'+
      '<td><span class="badge '+badge+'">'+(c.estado==='CANCELADA'?'Cancelada':pasada?'Pasada':'Activa')+'</span></td>'+
      '<td><button class="btn-sm secondary" onclick="verDetalle(\''+c.id+'\')" style="padding:6px 14px;font-size:10px">Ver</button>'+cancelBtn+'</td>';
    tbody.appendChild(tr);
  });
}

function verDetalle(id){
  const c=todasCitas.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('modal-detalle-body').innerHTML=
    '<div><strong>Nombre:</strong> '+(c.nombre||'—')+'</div>'+
    '<div><strong>Email:</strong> '+(c.email||'—')+'</div>'+
    '<div><strong>Teléfono:</strong> '+(c.telefono||'—')+'</div>'+
    '<div><strong>Barbero:</strong> '+(c.barbero||'—')+'</div>'+
    '<div><strong>Servicio:</strong> '+(c.servicio||'—')+'</div>'+
    '<div><strong>Fecha:</strong> '+(c.fecha||'—')+' a las '+(c.hora||'—')+'</div>'+
    '<div><strong>Estado:</strong> '+(c.estado||'—')+'</div>';
  const btn=document.getElementById('btn-cancelar-modal');
  btn.style.display=c.estado==='CONFIRMADA'?'block':'none';
  btn.onclick=()=>{cerrarModal('modal-detalle');cancelarAdminById(id);};
  abrirModal('modal-detalle');
}

async function cancelarAdminRow(btn){
  const id=btn.dataset.id;
  if(!confirm('¿Cancelar esta cita?')) return;
  btn.disabled=true; btn.textContent='...';
  try {
    await supa('citas?id=eq.'+id,'PATCH',{estado:'CANCELADA'});
    const c=todasCitas.find(x=>x.id===id);
    if(c) c.estado='CANCELADA';
    const tr=btn.closest('tr');
    const badgeEl=tr.querySelector('.badge');
    if(badgeEl){badgeEl.className='badge cancelada';badgeEl.textContent='Cancelada';}
    btn.remove();
    calcStats(); renderCalendario();
  }catch(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Cancelar';}
}

async function cancelarAdminById(id){
  try {
    await supa('citas?id=eq.'+id,'PATCH',{estado:'CANCELADA'});
    const c=todasCitas.find(x=>x.id===id);
    if(c) c.estado='CANCELADA';
    renderTabla(); calcStats(); renderCalendario();
  }catch(e){alert('Error: '+e.message);}
}

// CALENDARIO
function cambiarDia(d){ calFecha.setDate(calFecha.getDate()+d); renderCalendario(); }
function irHoy(){ calFecha=new Date(); calFecha.setHours(0,0,0,0); renderCalendario(); }
function filtrarB(b,el){
  calBarbero=b;
  document.querySelectorAll('.bbtn').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  renderCalendario();
}

function renderCalendario(){
  const dow=calFecha.getDay();
  const fs=toStr(calFecha);
  document.getElementById('cal-label').textContent=DIAS[dow]+', '+calFecha.getDate()+' de '+MESES[calFecha.getMonth()]+' '+calFecha.getFullYear();
  const horas=HORARIOS[dow];
  const cols=document.getElementById('cal-cols');
  if(!horas||!horas.length){
    cols.innerHTML='<div style="background:var(--white);border:1px solid var(--beige);padding:60px;text-align:center;font-family:\'Cormorant Garamond\',serif;font-size:24px;color:var(--muted);font-style:italic;">Cerrado este día</div>';
    return;
  }
  const barbs=calBarbero==='Todos'?BARBEROS:[calBarbero];
  cols.style.gridTemplateColumns=calBarbero==='Todos'?'repeat(auto-fit,minmax(260px,1fr))':'1fr';
  cols.innerHTML='';
  const citasHoyAll=todasCitas.filter(c=>c.fecha===fs&&c.estado==='CONFIRMADA');
  barbs.forEach(barb=>{
    const citasHoy=citasHoyAll.filter(c=>c.barbero===barb);
    const col=document.createElement('div'); col.className='cal-col';
    col.innerHTML='<div class="cal-col-head"><span class="cal-col-name">'+barb+'</span><span class="cal-col-count">'+citasHoy.length+' cita'+(citasHoy.length!==1?'s':'')+'</span></div>';
    const tl=document.createElement('div');
    horas.forEach(hora=>{
      const row=document.createElement('div'); row.className='timeline-row';
      const hourEl=document.createElement('div'); hourEl.className='timeline-hour'; hourEl.textContent=hora;
      const slot=document.createElement('div'); slot.className='timeline-slot';
      const cita=citasHoy.find(c=>c.hora===hora);
      if(cita){
        const chip=document.createElement('div'); chip.className='cita-chip';
        chip.innerHTML='<strong>'+(cita.nombre||'—')+'</strong><small>'+(cita.servicio||'')+'</small>';
        chip.onclick=()=>verDetalle(cita.id);
        slot.appendChild(chip);
      } else {
        const add=document.createElement('button'); add.className='slot-add'; add.textContent='+'; add.title='Añadir cita';
        add.onclick=()=>{
          document.getElementById('n-barbero').value=barb;
          document.getElementById('n-fecha').value=fs;
          document.getElementById('n-hora').value=hora;
          abrirModal('modal-nueva');
        };
        slot.appendChild(add);
      }
      row.appendChild(hourEl); row.appendChild(slot); tl.appendChild(row);
    });
    col.appendChild(tl); cols.appendChild(col);
  });
}

// NUEVA CITA MANUAL
function abrirModalNueva(){ abrirModal('modal-nueva'); }
async function crearCitaManual(){
  const nombre=document.getElementById('n-nombre').value.trim();
  const email=document.getElementById('n-email').value.trim();
  const tel=document.getElementById('n-tel').value.trim();
  const barbero=document.getElementById('n-barbero').value;
  const servicio=document.getElementById('n-servicio').value;
  const fecha=document.getElementById('n-fecha').value;
  const horaRaw=document.getElementById('n-hora').value;
  const hora=horaRaw?horaRaw.slice(0,5):'';
  const msg=document.getElementById('nueva-msg');
  if(!nombre||!barbero||!servicio||!fecha||!hora){ showInlineMsg(msg,'Rellena todos los campos.','err'); return; }
  try {
    const id='MAN'+Date.now();
    const row=await supa('citas','POST',{id,nombre,email:email||'—',telefono:tel||'—',barbero,servicio,fecha,hora,estado:'CONFIRMADA'});
    const nueva=Array.isArray(row)?row[0]:row;
    todasCitas.push(nueva||{id,nombre,email,telefono:tel,barbero,servicio,fecha,hora,estado:'CONFIRMADA'});
    showInlineMsg(msg,'Cita creada.','ok');
    renderTabla(); calcStats(); renderCalendario();
    setTimeout(()=>cerrarModal('modal-nueva'),1500);
  }catch(e){ showInlineMsg(msg,'Error: '+e.message,'err'); }
}

// CIERRES (local)
function toggleCierre(){
  const t=document.getElementById('ci-tipo').value;
  document.getElementById('ci-f2-wrap').style.display=t==='rango'?'block':'none';
  document.getElementById('ci-hora-wrap').style.display=t==='hora'?'block':'none';
  document.getElementById('ci-f1-label').textContent=t==='rango'?'Fecha inicio':'Fecha';
}
function guardarCierre(){
  const tipo=document.getElementById('ci-tipo').value;
  const barbero=document.getElementById('ci-barbero').value;
  const fecha1=document.getElementById('ci-fecha1').value;
  const fecha2=document.getElementById('ci-fecha2').value;
  const hora=document.getElementById('ci-hora-val').value;
  const motivo=document.getElementById('ci-motivo').value;
  const msg=document.getElementById('cierre-msg');
  if(!fecha1){ showInlineMsg(msg,'Selecciona una fecha.','err'); return; }
  if(tipo==='rango'&&!fecha2){ showInlineMsg(msg,'Selecciona fecha fin.','err'); return; }
  if(tipo==='hora'&&!hora){ showInlineMsg(msg,'Selecciona una hora.','err'); return; }
  const cierre={id:Date.now(),tipo,barbero,fecha1,fecha2:fecha2||null,hora:hora?hora.slice(0,5):null,motivo};
  todosCierres.push(cierre);
  localStorage.setItem('av119_cierres',JSON.stringify(todosCierres));
  showInlineMsg(msg,'Cierre guardado.','ok');
  renderCierres();
}
function eliminarCierre(id){
  todosCierres=todosCierres.filter(c=>c.id!==id);
  localStorage.setItem('av119_cierres',JSON.stringify(todosCierres));
  renderCierres();
}
function renderCierres(){
  const list=document.getElementById('cierres-list');
  if(!todosCierres.length){ list.innerHTML='<p style="font-size:13px;color:var(--muted)">No hay cierres configurados.</p>'; return; }
  list.innerHTML='';
  [...todosCierres].reverse().forEach(c=>{
    const div=document.createElement('div'); div.className='cierre-item';
    let desc=c.tipo==='dia'?'Día completo · '+c.fecha1:c.tipo==='rango'?c.fecha1+' → '+c.fecha2:c.fecha1+' a las '+c.hora;
    div.innerHTML='<div class="cierre-item-info"><strong>'+c.barbero+'</strong> — '+desc+(c.motivo?'<br><span>'+c.motivo+'</span>':'')+'</div><button class="btn-sm danger" onclick="eliminarCierre('+c.id+')">Eliminar</button>';
    list.appendChild(div);
  });
}

// MODALES
function abrirModal(id){ document.getElementById(id).classList.add('open'); }
function cerrarModal(id){ document.getElementById(id).classList.remove('open'); }
function showInlineMsg(el,txt,type){
  el.textContent=txt; el.className='msg-inline '+type; el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});
});


</script>
